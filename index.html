<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Home</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
        }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* CONTENITORE SWIPE REALE - SCORRIMENTO NATIVO FLUIDO */
        #home-screen { 
            background-color: #000; 
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        /* Nasconde la barra di scorrimento del browser */
        #home-screen::-webkit-scrollbar { display: none; }
        
        .page {
            flex: 0 0 100%;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            scroll-snap-align: start;
            box-sizing: border-box;
        }
        
        #page1 { background-image: url('home1.PNG'); }
        #page2 { background-image: url('home2.PNG'); }
        #page3 { background-image: url('home3.PNG'); }

        #status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            pointer-events: none; 
        }

        /* INTERFACCIA SVEGLIA */
        #clock-screen { background-color: #000; box-sizing: border-box; z-index: 20; }
        .clock-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 40px 20px 10px 20px; border-bottom: 0.5px solid #1c1c1e; 
        }
        .clock-header h2 { margin: 0; color: #ff9f0a; font-size: 26px; font-weight: bold; }
        .back-btn, .add-btn { color: #ff9f0a; font-size: 24px; cursor: pointer; }
        
        #alarms-list { overflow-y: auto; flex-grow: 1; padding: 0 20px; }
        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid #1c1c1e;
        }
        .alarm-time { font-size: 48px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 13px; color: #8e8e93; margin-top: 4px; display: block; }
        .active-alarm .alarm-time, .active-alarm .alarm-label { color: #fff; }

        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="status-bar">
        <span id="live-time">09:41</span>
        <div>📶 🔋</div>
    </div>

    <div id="home-screen" class="screen">
        <div class="page" id="page1"></div>
        <div class="page" id="page2"></div>
        <div class="page" id="page3"></div>
    </div>

    <div id="clock-screen" class="screen hidden">
        <div class="clock-header">
            <span class="back-btn" onclick="resetApp()">✕</span>
            <h2>Sveglia</h2>
            <span class="add-btn">+</span>
        </div>
        <div id="alarms-list"></div>
    </div>

    <script>
        let inputDigits = []; 
        const homeScreen = document.getElementById('home-screen');

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        // CATTURA IL TOCCO INIZIALE (Nessun lag numerico e swipe libero)
        homeScreen.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length > 0) {
                const touch = e.touches[0];
                
                if (inputDigits.length < 4) {
                    const digit = getDigitFromCoords(touch.clientX, touch.clientY);
                    inputDigits.push(digit);
                    console.log("Inserito:", digit, "Sequenza attuale:", inputDigits);
                } else {
                    // Se l'orario è già completo (4 cifre inserite), il tocco apre la sveglia
                    // Per farlo in modo naturale, controlliamo che l'utente sia tornato a Pagina 1
                    const currentPage = Math.round(homeScreen.scrollLeft / window.innerWidth);
                    if (currentPage === 0) {
                        apriSveglia();
                    }
                }
            }
        }, { passive: true });

        // TASTIERINO MATEMATICO 3x3 IN BASSO A DESTRA
        function getDigitFromCoords(x, y) {
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Zona attiva: metà inferiore destra dello schermo
            const isRightSide = x > (w * 0.25); 
            const isBottomSide = y > (h * 0.5); 

            if (isRightSide && isBottomSide) {
                // Calcola le coordinate relative nella griglia
                const gridX = Math.floor((x - (w * 0.25)) / ((w * 0.75) / 3));
                const gridY = Math.floor((y - (h * 0.5)) / ((h * 0.5) / 3));

                // Mappatura fissa da 1 a 9 senza righe vuote
                const matrix = [
                    [1, 2, 3],
                    [4, 5, 6],
                    [7, 8, 9]
                ];

                const targetY = Math.max(0, Math.min(gridY, 2));
                const targetX = Math.max(0, Math.min(gridX, 2));
                
                return matrix[targetY][targetX];
            }
            return 0; // Qualsiasi tocco fuori dal quadrato genera uno 0
        }

        function apriSveglia() {
            homeScreen.classList.add('hidden');
            document.getElementById('clock-screen').classList.remove('hidden');

            // Recupera gli elementi o inserisce lo zero protettivo
            const d1 = inputDigits[0] !== undefined ? inputDigits[0] : 0;
            const d2 = inputDigits[1] !== undefined ? inputDigits[1] : 0;
            const d3 = inputDigits[2] !== undefined ? inputDigits[2] : 0;
            const d4 = inputDigits[3] !== undefined ? inputDigits[3] : 0;

            const oraForzata = `${d1}${d2}:${d3}${d4}`;
            
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort(); 
            }

            const container = document.getElementById('alarms-list');
            container.innerHTML = "";

            sveglieStandard.forEach(orario => {
                const isActive = (orario === oraForzata);
                const alarmRow = document.createElement('div');
                alarmRow.className = `alarm-item ${isActive ? 'active-alarm' : ''}`;
                alarmRow.innerHTML = `
                    <div class="alarm-time-info">
                        <span class="alarm-time">${orario}</span>
                        <span class="alarm-label">Sveglia</span>
                    </div>
                    <div class="ios-switch ${isActive ? 'on' : ''}">
                        <div class="ios-switch-handle"></div>
                    </div>
                `;
                container.appendChild(alarmRow);
            });
        }

        function resetApp() {
            inputDigits = [];
            homeScreen.scrollLeft = 0; 
            document.getElementById('clock-screen').classList.add('hidden');
            homeScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
