<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Home</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
        }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        #home-screen {
            background-color: #000;
        }
        #slider-container {
            display: flex;
            width: 300%; 
            height: 100%;
            will-change: transform;
        }
        .page {
            width: 33.333%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        #page1 { background-image: url('home1.PNG'); }
        #page2 { background-image: url('home2.PNG'); }
        #page3 { background-image: url('home3.PNG'); }

        #status-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            letter-spacing: -0.2px;
            pointer-events: none; 
        }
        .battery-icons { font-size: 14px; letter-spacing: 2px; }

        #clock-screen { background-color: #000; box-sizing: border-box; z-index: 20; }
        .clock-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 40px 20px 10px 20px; border-bottom: 0.5px solid #1c1c1e; 
        }
        .clock-header h2 { margin: 0; color: #ff9f0a; font-size: 26px; font-weight: bold; }
        .back-btn, .add-btn { color: #ff9f0a; font-size: 24px; cursor: pointer; font-weight: 400; }
        
        #alarms-list {
            overflow-y: auto;
            flex-grow: 1;
            padding: 0 20px;
        }
        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid #1c1c1e;
        }
        .alarm-time { font-size: 48px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 13px; color: #8e8e93; margin-top: 4px; display: block; }

        .active-alarm .alarm-time { color: #fff; font-weight: 300; }
        .active-alarm .alarm-label { color: #fff; }

        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s; box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <div id="status-bar">
            <span id="live-time">09:41</span>
            <div class="battery-icons">📶 🔋</div>
        </div>
        
        <div id="slider-container">
            <div class="page" id="page1"></div>
            <div class="page" id="page2"></div>
            <div class="page" id="page3"></div>
        </div>
    </div>

    <div id="clock-screen" class="screen hidden">
        <div class="clock-header">
            <span class="back-btn" onclick="resetApp()">✕</span>
            <h2>Sveglia</h2>
            <span class="add-btn">+</span>
        </div>
        <div id="alarms-list"></div>
    </div>

    <script>
        let touchStartX = 0;
        let touchStartY = 0;
        let currentTranslate = 0;
        let prevTranslate = 0;
        let isDragging = false;
        let animationId = 0;
        
        let inputDigits = []; 
        let currentIndex = 0; 
        const totalPages = 3;

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        const slider = document.getElementById('slider-container');
        const widthPage = window.innerWidth;

        slider.addEventListener('touchstart', touchStart);
        slider.addEventListener('touchmove', touchMove);
        slider.addEventListener('touchend', touchEnd);

        function touchStart(e) {
            isDragging = true;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            
            if (inputDigits.length < 4) {
                const digit = getDigitFromCoords(touchStartX, touchStartY);
                inputDigits.push(digit);
            }
            
            slider.style.transition = 'none'; 
            animationId = requestAnimationFrame(animation);
        }

        function touchMove(e) {
            if (!isDragging) return;
            const currentX = e.touches[0].clientX;
            const currentTranslateX = prevTranslate + (currentX - touchStartX);
            
            if (currentTranslateX > 0) currentTranslate = 0;
            else if (currentTranslateX < -(widthPage * (totalPages - 1))) currentTranslate = -(widthPage * (totalPages - 1));
            else currentTranslate = currentTranslateX;
        }

        function touchEnd(e) {
            isDragging = false;
            cancelAnimationFrame(animationId);
            
            const movedBy = currentTranslate - prevTranslate;

            if (movedBy < -100 && currentIndex < totalPages - 1) {
                currentIndex += 1;
            } else if (movedBy > 100 && currentIndex > 0) {
                currentIndex -= 1;
            }

            slider.style.transition = 'transform 0.3s ease-out';
            currentTranslate = currentIndex * -widthPage;
            prevTranslate = currentTranslate;
            setSliderPosition();

            if (currentIndex === 0 && inputDigits.length >= 4) {
                setTimeout(apriSveglia, 400);
            }
        }

        function animation() {
            setSliderPosition();
            if (isDragging) requestAnimationFrame(animation);
        }

        function setSliderPosition() {
            slider.style.transform = `translateX(${currentTranslate}px)`;
        }

        function getDigitFromCoords(x, y) {
            const w = window.innerWidth;
            const h = window.innerHeight;

            const isRightSide = x > (w * 0.25); 
            const isBottomSide = y > (h * 0.5); 

            if (isRightSide && isBottomSide) {
                const gridX = Math.floor((x - (w * 0.25)) / ((w * 0.75) / 3));
                const gridY = Math.floor((y - (h * 0.5)) / ((h * 0.5) / 3));

                const matrix = [,
 ,
                    [7, 8, 9]
                ];

                const targetY = Math.min(Math.max(gridY, 0), 2);
                const targetX = Math.min(Math.max(gridX, 0), 2);
                
                return matrix[targetY][targetX];
            }
            return 0; 
        }

        function apriSveglia() {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('clock-screen').classList.remove('hidden');

            const d1 = inputDigits[0] !== undefined ? inputDigits[0] : 0;
            const d2 = inputDigits[1] !== undefined ? inputDigits[1] : 0;
            const d3 = inputDigits[2] !== undefined ? inputDigits[2] : 0;
            const d4 = inputDigits[3] !== undefined ? inputDigits[3] : 0;

            const oraForzata = `${d1}${d2}:${d3}${d4}`;
            
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort(); 
            }

            const container = document.getElementById('alarms-list');
            container.innerHTML = "";

            sveglieStandard.forEach(orario => {
                const isActive = (orario === oraForzata);
                const alarmRow = document.createElement('div');
                alarmRow.className = `alarm-item ${isActive ? 'active-alarm' : ''}`;
                alarmRow.innerHTML = `
                    <div class="alarm-time-info">
                        <span class="alarm-time">${orario}</span>
                        <span class="alarm-label">Sveglia</span>
                    </div>
                    <div class="ios-switch ${isActive ? 'on' : ''}">
                        <div class="ios-switch-handle"></div>
                    </div>
                `;
                container.appendChild(alarmRow);
            });
        }

        function resetApp() {
            inputDigits = [];
            currentIndex = 0;
            currentTranslate = 0;
            prevTranslate = 0;
            slider.style.transition = 'none';
            setSliderPosition();
            document.getElementById('clock-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
