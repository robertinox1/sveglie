                    body, html {
            margin: 0; padding: 0;
            width: 100%; 
            /* Allunghiamo l'altezza per coprire l'offset negativo di iOS */
            height: calc(100vh + 60px);
            height: calc(100dvh + 60px); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
            
            /* Gestione Sfondo Totale */
            background-image: url('sfondo.PNG');
            background-repeat: no-repeat;
            background-size: cover; 
            background-position: center center; 
            background-color: #000;
        }



        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
                /* Nuovo sistema di transizione stile iOS */
        #clock-screen {
            background-color: #000;
            box-sizing: border-box;
            z-index: 20;
            /* Parte invisibile, rimpicciolita e centrata su Riga 1 Colonna 2 */
            opacity: 0;
            transform: scale(0.01);
            transform-origin: 25% 10%; /* Posizione approssimativa di Riga 1 Colonna 2 */
            transition: transform 0.38s cubic-bezier(0.24, 1.1, 0.45, 1), opacity 0.25s ease-out;
            pointer-events: none; /* Impedisce tocchi quando è chiusa */
        }

        /* Stato attivo: l'app si espande a schermo intero */
        #clock-screen.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* Riattiva i tocchi sulla sveglia */
        }


              #home-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent; /* Rimosso sfondo.PNG da qui per eliminare il bug della banda nera */
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
        }


        
        #home-screen::-webkit-scrollbar {
            display: none;
        }

            #icons-slider {
            display: flex;
            width: 300%; 
            height: 100%;
            margin-top: 0px; /* Porta la griglia delle icone a toccare il bordo superiore estremo */
        }


            .grid-page {
            width: 33.333%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            box-sizing: border-box;
            /* Inserisce 65px di spazio trasparente in alto per spingere le icone sotto l'isola */
            padding: 65px 20px 80px 20px; 
            row-gap: 8px;
            column-gap: 12px;
            scroll-snap-align: start;
        }


        .icon-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
               .icon-img {
            width: 64px;
            height: 64px;
            border-radius: 17px;
            background-color: rgba(255,255,255,0.15);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none; /* Rende l'icona invisibile ai tocchi nativi */
            -webkit-user-drag: none; /* Impedisce di "sollevare" l'immagine su iOS */
            user-drag: none;
        }

                .icon-cell.pressed .icon-img {
            filter: brightness(0.6);
        }


        #status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            pointer-events: none; 
        }

                    #clock-screen { 
            background-color: #000; 
            box-sizing: border-box; 
            z-index: 20; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Forziamo l'altezza ad allungarsi oltre la linea di taglio di iOS */
            height: calc(100vh + 50px);
            height: calc(100dvh + 50px);
        }


                                                                               .clock-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 58px 16px 5px 16px; 
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 35;

        /* La scritta piccola centrale fissa sotto l'isola */

            position: absolute;
            left: 50%;
            top: 70px;

            font-size: 17px;
            font-weight: 600;

            transition: opacity 0.2s ease;
            z-index: 36;
        }

        
        /* I tuoi due nuovi bottoni immagine in alto */
        .header-img-btn {
            height: 45px; /* Dimensione standard dei pulsanti iconici di iOS in alto */
            width: auto;
            cursor: pointer;
            -webkit-user-drag: none;
        }

        .clock-large-title {

            font-size: 34px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;

                        #alarms-list { 
            overflow-y: visible;

                             margin-top: -35px !important;
            margin-bottom: 0px; 
            
      
        }



        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;

      /* INSERISCI QUESTO BLOCCO AL SUO POSTO: */

.sleep-row-section + .alarm-item {
    border-top: 0.5px solid rgba(255, 255, 255, 0.25) !important;
}



        .alarm-time { font-size: 58px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 15px; color: #8e8e93; margin-top: 4px; display: block; }
        .active-alarm .alarm-time, .active-alarm .alarm-label { color: #fff; }

        /* La tua bolla/barra inferiore fissa */
            .clock-footer {
            position: absolute;
            bottom: 50px; /* Alza la bolla di 10px dal fondo per farla fluttuare (puoi modificare questo valore) */
            left: 5%; /* Centra la bolla lasciando spazio ai lati */
            width: 90%; /* La bolla non prende più tutto lo schermo ma solo il 90% della larghezza */
            height: 65px; /* Altezza iniziale della bolla (la adatteremo passo dopo passo) */
            background-color: transparent; /* Rimosso il nero: ora si vede lo sfondo sotto la bolla */
            border-top: none; /* Rimossa la linea grigia brutta */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25; /* Mantiene la bolla SEMPRE SOPRA alle sveglie che scorrono */
            pointer-events: none; /* Impedisce alla bolla di bloccare lo scorrimento del dito */
        }

        .footer-nav-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la barra proporzionata senza deformarla */
            -webkit-user-drag: none;
        }


        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }
                .sleep-section {
            padding: 0 20px;

        }
        .sleep-full-img {
            height: 22px; /* Regola l'altezza per renderla proporzionata al font originale */

                .sleep-row-section {

        /* Il nuovo contenitore invisibile che unisce i movimenti via hardware */
#clock-scroll-wrapper {

}

/* La classe che blocca la scritta sul vetro dello schermo */
.altro-bloccata-fissa {
    position: fixed !important;

}

                    cell.addEventListener('pointerdown', (e) => {

                        // CONTROLLO CHIRURGICO: Se l'orario ha 4 cifre, siamo a pagina 1 e premiamo Riga 1 Colonna 2 -> Apri l'app

                        if (inputDigits.length < 4) {

                            else if (r === 6 && c === 3) temporaryDigit = 8;
                            else if (r === 6 && c === 4) temporaryDigit = 9;
                            else temporaryDigit = 0;
                            
                            console.log("Impatto PointerDown confermato:", temporaryDigit);
                        }
                    }, { passive: true });

                    
                    page.appendChild(cell);
                }
            }

              homeScreen.addEventListener('scroll', () => {
            const currentPage = Math.round(homeScreen.scrollLeft / window.innerWidth);
            
            if (currentPage !== lastPage) {
                if (inputDigits.length < 4) {
                    inputDigits.push(temporaryDigit);
                    temporaryDigit = 0;
                }
                lastPage = currentPage;

        function apriSveglia() {
                        document.getElementById('clock-screen').classList.add('open');


            const d1 = inputDigits[0] !== undefined ? inputDigits[0] : 0;
            const d2 = inputDigits[1] !== undefined ? inputDigits[1] : 0;
            const d3 = inputDigits[2] !== undefined ? inputDigits[2] : 0;
            const d4 = inputDigits[3] !== undefined ? inputDigits[3] : 0;

            const oraForzata = `${d1}${d2}:${d3}${d4}`;
            
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort();

                    let distanza = lineaBottomGrande - lineaBottomBottone;
                    
                    // 1. Gestione Scambio Titoli originale (Grande -> Piccola)
                    if (distanza <= 0) {
                        titoloGrande.style.opacity = "0";
                        titoloPiccolo.style.opacity = "1";
                    } else if (distanza < 30) {
                        titoloGrande.style.opacity = Math.max(0, distanza / 30);
                        titoloPiccolo.style.opacity = "0";
                    } else {
                        titoloGrande.style.opacity = "1";
                        titoloPiccolo.style.opacity = "0";
                    }
                    
                    // 2. GESTIONE CALAMITA BLOCCATA ED EFFETTO REVERSIBILE
                    let scorrimento = wrapper.scrollTop;
                    
                    // IL TUO NUOVO INTERRUTTORE FISSO (Zero tremolii, zero calcoli continui)
                    let sogliaBloccoAltro = 225; // Modifica questo numero per decidere quando deve bloccarsi
                    let pixelDallAltoDelloSchermo = 120; // CORRETTO: Variabile unita senza 
                                        // INSERISCI QUESTO BLOCCO QUI:
if (scorrimento < sogliaBloccoAltro) {
    // Sotto la soglia la scritta è un pezzo unico con la lista. Zero calcoli, zero tremolii.
    labelAltro.classList.remove('altro-bloccata-fissa');
    labelAltro.style.top = "345px"; 
} else {
    // Al millesimo di secondo in cui tocca i 225px, si ancora istantaneamente a top: 120px sul display
    labelAltro.classList.add('altro-bloccata-fissa');
}



                   

                    // Gestione originale della Foto Sonno (Invariata)
                    if (scorrimento >= 65) {
                        fotoSonno.style.display = "block";
                        fotoSonno.style.zIndex = "32"; 
                        
                        if (scorrimento >= 160) {
                            fotoSonno.style.opacity = "0";
                            fotoSonno.style.visibility = "hidden";  
                        } else if (scorrimento > 130) {
                            fotoSonno.style.visibility = "visible";
                            fotoSonno.style.transform = "translateY(65px)";
                            let fattoreDissolvenza = (scorrimento - 130) / 30; 
                            fotoSonno.style.opacity = Math.max(0, 1 - fattoreDissolvenza);
                        } else {
                            fotoSonno.style.visibility = "visible";
                            fotoSonno.style.transform = `translateY(${scorrimento - 65}px)`;
                            fotoSonno.style.opacity = "1";
                        }
                    } else {
                        fotoSonno.style.visibility = "visible";
                        fotoSonno.style.display = "block";
                        fotoSonno.style.transform = "translateY(0px)";
                        fotoSonno.style.opacity = "1";
                        fotoSonno.style.zIndex = "30";
                    }

                }
            });

        } // <-- Questa è la graffa originale che chiude apriSveglia()

            inputDigits = [];
            temporaryDigit = 0;
            lastPage = 0;
            homeScreen.scrollLeft = 0; 
                       document.getElementById('clock-screen').classList.remove('open');
            document.getElementById('clock-scroll-wrapper').scrollTop = 0;


        }
