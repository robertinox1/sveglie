<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
        <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


    <title>Home</title>
    <link rel="apple-touch-icon" href="Orologio.PNG">
    
    <!-- Icona per Android / Chrome / Windows -->
    <link rel="icon" type="image/png" sizes="192x192" href="Orologio.PNG">
    <link rel="icon" type="image/png" sizes="512x512" href="Orologio.PNG">
    
    <!-- Collegamento al Manifest -->
    <link rel="manifest" href="manifest.json">
    <style>
                    body, html {
            margin: 0; padding: 0;
            width: 100%; 
            /* Allunghiamo l'altezza per coprire l'offset negativo di iOS */
            height: calc(100vh + 60px);
            height: calc(100dvh + 60px); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
            
            /* Gestione Sfondo Totale */
            background-image: url('sfondo.PNG');
            background-repeat: no-repeat;
            background-size: cover; 
            background-position: center center; 
            background-color: #000;
        }



        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
                /* Nuovo sistema di transizione stile iOS */
        #clock-screen {
            background-color: #000;
            box-sizing: border-box;
            z-index: 20;
            /* Parte invisibile, rimpicciolita e centrata su Riga 1 Colonna 2 */
            opacity: 0;
            transform: scale(0.01);
            transform-origin: 25% 10%; /* Posizione approssimativa di Riga 1 Colonna 2 */
            transition: transform 0.5s cubic-bezier(0.24, 1.1, 0.45, 1), opacity 0.35s ease-out;
            pointer-events: none; /* Impedisce tocchi quando è chiusa */
              will-change: transform, opacity;
    transform: scale(0.01) translateZ(0);
        }

        /* Stato attivo: l'app si espande a schermo intero */
        #clock-screen.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* Riattiva i tocchi sulla sveglia */
        }


              #home-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent; /* Rimosso sfondo.PNG da qui per eliminare il bug della banda nera */
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
        }


        
        #home-screen::-webkit-scrollbar {
            display: none;
        }

            #icons-slider {
            display: flex;
            width: 300%; 
            height: 100%;
            margin-top: 0px; /* Porta la griglia delle icone a toccare il bordo superiore estremo */
        }


            .grid-page {
            width: 33.333%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            box-sizing: border-box;
            /* Inserisce 65px di spazio trasparente in alto per spingere le icone sotto l'isola */
            padding: 75px 20px 125px 20px; 
            row-gap: 8px;
            column-gap: 12px;
            scroll-snap-align: start;
                 scroll-snap-stop: always; 
        }


        .icon-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
               .icon-img {
            width: 64px;
            height: 64px;
            border-radius: 17px;
            background-color: rgba(255,255,255,0.15);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none; /* Rende l'icona invisibile ai tocchi nativi */
            -webkit-user-drag: none; /* Impedisce di "sollevare" l'immagine su iOS */
            user-drag: none;
        }

                .icon-cell.pressed .icon-img {
            filter: brightness(0.6);
        }


        #status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            pointer-events: none; 
        }

                    #clock-screen { 
            background-color: #000; 
            box-sizing: border-box; 
            z-index: 20; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Forziamo l'altezza ad allungarsi oltre la linea di taglio di iOS */
            height: calc(100vh + 50px);
            height: calc(100dvh + 50px);
        }


                                                                               .clock-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 58px 16px 5px 16px; 
            box-sizing: border-box;
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 35;
            background-color: transparent; /* Totale trasparenza per non coprire nulla */
        }

        
        /* La scritta piccola centrale fissa sotto l'isola */
        .clock-header-title {
            position: absolute;
            left: 50%;
            top: 70px;
            transform: translateX(-50%);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            opacity: 0; /* Invisibile all'inizio */
            transition: opacity 0.2s ease;
            z-index: 36;
        }

        
        /* I tuoi due nuovi bottoni immagine in alto */
        .header-img-btn {
            height: 45px; /* Dimensione standard dei pulsanti iconici di iOS in alto */
            width: auto;
            cursor: pointer;
            -webkit-user-drag: none;
        }

                    .clock-large-title {
            margin: 0 !important;
            padding: 0px 20px 15px 20px !important;
            /* MODIFICATO: Alzata ancora un po' (passa da -25px a -35px) */
            margin-top: -35px !important; 
            font-size: 34px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            text-align: left !important;
        }

        /* Gestione contenitore */
        #alarms-list { 
            overflow-y: visible; 
            flex-grow: 1; 
            padding: 150px 0px 100px 0px !important; 
            margin-bottom: 0px; 
        }

        /* 1. SEZIONE SONNO (Abbassata leggermente rispetto alla scritta) */
        .sleep-section {
            width: 100% !important;
            padding: 0 20px !important; 
            box-sizing: border-box;
            /* MODIFICATO: Aggiunto margine per allontanarla dalla scritta Sveglie e spingerla in basso */
            margin-top: 15px !important; 
        }
        .sleep-full-img {
            height: 22px !important; 
            width: auto !important;   
            display: block;
        }

        /* 2. SEZIONE CONFIGURA */
        .sleep-row-section {
            width: 100% !important;
            padding: 0 20px !important; 
            box-sizing: border-box;
            margin-top: 10px !important;
        }
        .sleep-row-img {
            width: 100% !important;  
            height: auto !important;
            display: block;
        }

            .alarm-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            /* Cambiato da 9px 20px a 9px 0: togliamo il padding per sbloccare la linea grigia */
            padding: 11px 0 !important; 
            border-bottom: 1.5px solid rgba(84, 84, 88, 0.45) !important;
            
            /* LE REGIOLE CHIAVE: Costringono la linea a partire a 20px e finire a 20px */
            margin-left: 20px !important;
            margin-right: 20px !important;
            width: calc(100% - 40px) !important; /* Mantiene il rigo proporzionato alla larghezza dello schermo */
            box-sizing: border-box;
        }

        /* AGGIUNGE IL BORDO ANCHE SOPRA LA PRIMA SVEGLIA */
        .sleep-row-section + .alarm-item {
            border-top: 1.5px solid rgba(84, 84, 88, 0.45) !important;
        }

        /* 3. DISTANZIATORE: Ridotto leggermente (da 120px a 110px) per compensare la discesa delle foto */
        .sleep-row-section::after {
            content: "";
            display: block;
            height: 110px; 
        }



        .alarm-time { font-size: 58px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 15px; color: #8e8e93; margin-top: 4px; display: block; }
        .active-alarm .alarm-time, .active-alarm .alarm-label { color: #fff; }

        /* La tua bolla/barra inferiore fissa */
            .clock-footer {
            position: absolute;
            bottom: 65px; /* Alza la bolla di 10px dal fondo per farla fluttuare (puoi modificare questo valore) */
            left: 5%; /* Centra la bolla lasciando spazio ai lati */
            width: 90%; /* La bolla non prende più tutto lo schermo ma solo il 90% della larghezza */
            height: 65px; /* Altezza iniziale della bolla (la adatteremo passo dopo passo) */
            background-color: transparent; /* Rimosso il nero: ora si vede lo sfondo sotto la bolla */
            border-top: none; /* Rimossa la linea grigia brutta */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25; /* Mantiene la bolla SEMPRE SOPRA alle sveglie che scorrono */
            pointer-events: none; /* Impedisce alla bolla di bloccare lo scorrimento del dito */
        }

        .footer-nav-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la barra proporzionata senza deformarla */
            -webkit-user-drag: none;
        }


        .ios-switch {
            width: 62px; height: 28px; background-color: #48484a;
            border-radius: 25px; position: relative; transition: background-color 0.04s linear;
             cursor: pointer;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 37px; height: 24px; background-color: #fff;
            border-radius: 25px; position: absolute; top: 2px; left: 2px;
            transition: transform 0.04s linear; 
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(21px); }
                .sleep-section {
            padding: 0 20px;
            margin-top: -5px;
        }
        .sleep-full-img {
            height: 22px; /* Regola l'altezza per renderla proporzionata al font originale */
            width: auto;
            object-fit: contain;
            -webkit-user-drag: none;
        }
                .sleep-row-section {
            padding: 0 20px;
            margin-top: 10px; /* Distanza provvisoria dalla scritta sopra */
        }
        .sleep-row-img {
            width: 100%; /* Prende tutta la larghezza disponibile tra i padding */
            height: auto;
            object-fit: contain;
            -webkit-user-drag: none;
        }
        /* Il nuovo contenitore invisibile che unisce i movimenti via hardware */
#clock-scroll-wrapper {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 20;
        -webkit-mask-image: linear-gradient(to bottom, transparent 58px, rgba(0,0,0,0.3) 80px, #000 110px, #000 85%, rgba(0,0,0,0.3) 93%, transparent 100%);
    mask-image: linear-gradient(to bottom, transparent 58px, rgba(0,0,0,0.3) 80px, #000 110px, #000 85%, rgba(0,0,0,0.3) 93%, transparent 100%);
}

/* La classe che blocca la scritta sul vetro dello schermo */
.altro-bloccata-fissa {
    position: fixed !important;
    top: 120px !important;
}
                   /* Il nuovo Dock CSS: stesse misure tue, ma in vero vetro cromato iOS */
        #home-dock-container {
            position: fixed; 
            /* Mantiene la stessa identica posizione verticale sul fondo del tuo dock originale */
            bottom: calc(14px + env(safe-area-inset-bottom));
            /* Rispetta al millesimo le tue misure di larghezza e centraggio originali */
            width: 95%;
            left: 2.5%;
            height: 94px; /* Altezza calibrata per ospitare perfettamente le icone da 64px */
            
            /* EFFETTO VETRO APPLE: Sfondo molto trasparente per far passare i colori + Sfocatura profonda */
           background-color: rgba(255, 255, 255, 0.07); 
            
            /* Satura i colori sottostanti facendoli risaltare attraverso la sfocatura */
            backdrop-filter: blur(20px) saturate(1.8) brightness(1.1); 
            -webkit-backdrop-filter: blur(20px) saturate(1.8) brightness(1.1);
            
            border-radius: 30px; /* Angoli curvi nativi Apple */
            box-sizing: border-box;
            padding: 0 20px;
            display: flex;
            justify-content: space-around; /* Distribuisce le 4 icone in modo simmetrico */
            align-items: center;
            z-index: 4; /* Resta z-index 4 come volevi tu, così la sveglia lo copre in automatico */
            pointer-events: none; /* Non blocca i tocchi fantasma */
        }

        /* Stile icone interne: stesse identiche caratteristiche della tua griglia superiore */
        .dock-icon-img {
            width: 64px;
            height: 64px;
            border-radius: 17px;
            object-fit: cover;
            -webkit-user-drag: none;
            user-drag: none;
        }

                /* Indicatore di pagina a pallini stile iOS */
        #page-indicator {
            position: fixed;
            bottom: calc(105px + env(safe-area-inset-bottom)); /* Spazio perfetto sopra il dock */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.18);/* Bolla semitrasparente leggera */
            backdrop-filter: blur(5px); /* Effetto vetro sfocato stile iOS */
            -webkit-backdrop-filter: blur(5px);
            z-index: 5; /* Sopra la griglia, sotto la sveglia */
            pointer-events: none;
        }

        .dot {
            width: 7px;
            height: 7px;
            background-color: rgba(255, 255, 255, 0.35); /* Pallino spento */
            border-radius: 50%;
            transition: background-color 0.2s ease;
        }

        .dot.active {
            background-color: #fff; /* Pallino attivo */
        }
                /* Pannello Modifica Sveglia stile iOS (Foglio dal basso) */
        #edit-alarm-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 93.5%; /* Copre quasi tutto lo schermo stile foglio iOS 15+ */
            background-color: #1c1c1e; /* Grigio scuro tipico dei pannelli iOS */
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            z-index: 40; /* Sopra la schermata sveglia e sopra il footer */
            transform: translateY(100%); /* Nascondi sotto lo schermo all'inizio */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            color: #fff;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Stato aperto del pannello */
        #edit-alarm-panel.show {
            transform: translateY(0);
        }

        /* Elementi grafici interni del pannello */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
        }

               /* Pulsanti Iconici Moderni per il Pannello */
        .panel-btn-cancel { 
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #2c2c2e; /* Poco più chiaro dello sfondo #1c1c1e */
            color: rgba(255, 255, 255, 0.7); /* Grigio chiaro/bianco soft */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 100; /* Tratto molto sottile */
            cursor: pointer; 
            user-select: none;
        }
        
        .panel-btn-save { 
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #ff9f0a; /* Arancione iOS */
            color: #fff; /* Spunta bianca piena */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 200; /* Tratto molto sottile */
            cursor: pointer; 
            user-select: none;
        }

        .panel-title { font-size: 17px; font-weight: 600; }
        
        .panel-body {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: 300;
        }
                /* Selettore a Ruota Stile iOS Picker */
              /* Contenitore con prospettiva 3D bilanciata */
        .picker-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 170px; /* Aumentata l'altezza generale per dare spazio */
            background-color: #1c1c1e;
            overflow: hidden;
            margin-top: 15px;
            user-select: none;
            perspective: 1200px; /* Prospettiva aumentata per addolcire la curva */
        }

        /* Bolla grigia centrale riproporzionata */
        .picker-selection-glow {
            position: absolute;
            left: 16px;
            right: 16px;
            height: 35px; /* Spessore perfetto per contenere il numero attivo */
            background-color: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            pointer-events: none;
            z-index: 1;
        }

        .picker-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 75px; 
            height: 100%;
            z-index: 2;
            transform-style: preserve-3d;
        }

        /* Stile dei numeri: più distanziati e opacità fissa al 100% */
        .picker-number {
            font-size: 22px; /* Leggermente più grandi e leggibili */
            font-weight: 400;
            color: rgba(255, 255, 255, 0.22); /* Tutti i numeri sono bianchi di base, nessuna sfumatura */
            height: 34px; /* Aumentato lo spazio verticale per staccarli */
            line-height: 34px;
            text-align: center;
            transition: transform 0.2s;
            transform-origin: center center;
        }

        /* Numero centrale attivo */
        .picker-number.active {
            font-size: 22px;
            font-weight: 400;
            color: #fff;
            transform: rotateX(0deg) translateZ(0px);
        }

        /* ROTAZIONE GRADUALE E FLUIDA (Rimosso opacity, modificati i gradi) */
        /* Primo livello sopra e sotto: piegatura leggerissima */
        .p-prev-1 { transform: rotateX(15deg) translateZ(-4px); }
        .p-next-1 { transform: rotateX(-15deg) translateZ(-4px); }

        /* Secondo livello: piegatura intermedia */
        .p-prev-2 { transform: rotateX(32deg) translateZ(-14px); }
        .p-next-2 { transform: rotateX(-32deg) translateZ(-14px); }

        /* Terzo livello (gli estremi): ora rimangono visibili e distanti */
        .p-prev-3 { transform: rotateX(48deg) translateZ(-28px); }
        .p-next-3 { transform: rotateX(-48deg) translateZ(-28px); }
                /* Box Opzioni Sveglia stile iOS */
        .alarm-options-box {
            background-color: rgba(255, 255, 255, 0.08); /* Stesso colore della bolla */
            border-radius: 25px;
            margin: 31px 16px;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 53px; /* Altezza standard delle righe iOS */
            padding: 0 16px;
            box-sizing: border-box;
             position: relative;
        }

        /* Linea di divisione tra le righe (non applicata all'ultima) */
        .option-row:not(:last-child)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20px; /* Non tocca il bordo sinistro */
            right: 20px; /* Non tocca il bordo destro */
            height: 1.5px;
            background-color: rgba(84, 84, 88, 0.45);
        }

        /* Testi di sinistra (sempre bianchi) */
        .option-left {
            color: #fff;
            font-size: 17px;
            font-weight: 400;
             margin-left: 8px;
        }

        /* Testi di destra (grigio chiaro) */
        .option-right {
            color: rgba(255, 255, 255, 0.45);
            font-size: 17px;
            font-weight: 400;
             margin-right: 8px;
        }

        /* Colore arancione speciale per l'ultima riga */
        .option-orange {
            color: #ff9f0a;
            font-size: 17px;
            font-weight: 400;
             margin-right: 8px;
        }

        /* Interruttore dedicato più piccolo per il box opzioni */
        .option-switch {
            width: 51px; /* Dimensione esatta degli switch secondari iOS */
            height: 31px;
            background-color: #48484a;
            border-radius: 25px;
            position: relative;
            cursor: pointer;
        }
        .option-switch.on {
            background-color: #34c759;
        }
        .option-switch-handle {
            width: 27px;
            height: 27px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.1s linear;
        }
        .option-switch.on .option-switch-handle {
            transform: translateX(20px);
        }
                /* Forza il pomello dello switch statico a stare fisso a destra senza animazioni */
        .ios-switch.on .static-handle {
            left: auto !important;
            right: 2px !important;
            transform: none !important;
        }
                /* Pulsante Elimina Sveglia stile iOS */
        .delete-alarm-btn-box {
            background-color: rgba(255, 255, 255, 0.08); /* Stesso sfondo della bolla e del box */
            border-radius: 25px; /* Stessi angoli arrotondati del tuo box opzioni */
            margin: 12px 16px 30px 16px; /* 0 sopra per stare vicino al box, 30px sotto di margine */
            height: 52px; /* Stessa identica altezza delle righe del tuo box */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Testo centrale rosso tipico dei pulsanti distruttivi Apple */
        .delete-alarm-text {
            color: #ff453a; /* Rosso iOS nativo per l'eliminazione */
            font-size: 17px;
            font-weight: 400;
            letter-spacing: -0.3px;
        }
        /* NUOVO: Elemento di sfocatura superiore sfumata stile iOS */
.clock-top-blur-cap {
    position: absolute;
    top: 58px; /* Parte esattamente da sotto i pulsanti/barra di stato */
    left: 0;
    width: 100%;
    height: 45px; /* Spazio di sfocatura sotto il tasto modifica */
    z-index: 22; /* Superiore alla lista (20) ma inferiore ai testi/bottoni (35) */
    pointer-events: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    /* Sfuma l'effetto blur facendolo scomparire verso il basso */
    -webkit-mask-image: linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    mask-image: linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
}





    </style>

<body>
        <!-- NUOVO: Schermata iniziale stile iOS per inserire il nome dello spettatore -->

                    // IL TUO NUOVO INTERRUTTORE FISSO (Zero tremolii, zero calcoli continui)
                    let sogliaBloccoAltro = 240; // Modifica questo numero per decidere quando deve bloccarsi
                    let pixelDallAltoDelloSchermo = 120; // CORRETTO: Variabile unita senza 
                                        // INSERISCI QUESTO BLOCCO QUI:
if (scorrimento < sogliaBloccoAltro) {
    // Sotto la soglia la scritta è un pezzo unico con la lista. Zero calcoli, zero tremolii.
    labelAltro.classList.remove('altro-bloccata-fissa');
    labelAltro.style.top = "360px"; 
} else {
    // Al millesimo di secondo in cui tocca i 225px, si ancora istantaneamente a top: 120px sul display
    labelAltro.classList.add('altro-bloccata-fissa');
}



                                       // Ripristinati i calcoli originali al 100% per far funzionare l'animazione
                    // Gestione della Foto Sonno ricalibrata sulle nuove altezze visive dello schermo
                    if (scorrimento >= 65) { 
                        fotoSonno.style.display = "block";
                        fotoSonno.style.zIndex = "32"; 
                        
                        if (scorrimento >= 165) { 
                            fotoSonno.style.opacity = "0";
                            fotoSonno.style.visibility = "hidden";  
                        } else if (scorrimento > 130) { 
                            fotoSonno.style.visibility = "visible";
                            fotoSonno.style.transform = "translateY(65px)"; 
                            let fattoreDissolvenza = (scorrimento - 130) / 30; 
                            fotoSonno.style.opacity = Math.max(0, 1 - fattoreDissolvenza);
                        } else {
                            fotoSonno.style.visibility = "visible";
                            fotoSonno.style.transform = `translateY(${scorrimento - 65}px)`; 
                            fotoSonno.style.opacity = "1";
                        }
                    } else {
                        fotoSonno.style.visibility = "visible";
                        fotoSonno.style.display = "block";
                        fotoSonno.style.transform = "translateY(0px)";
                        fotoSonno.style.opacity = "1";
                        fotoSonno.style.zIndex = "30";
                    }

                }
            });

        document.getElementById('alarms-list').addEventListener('click', function(e) {
    if (e.target.closest('.ios-switch')) return;
    
    const alarmItem = e.target.closest('.alarm-item');
    if (alarmItem) {
        const orarioSveglia = alarmItem.querySelector('.alarm-time').innerText;
        apriPannelloModifica(orarioSveglia);
    }
});
function apriPannelloModifica(orario) {
    const parti = orario.split(':');
    const ore = parseInt(parti[0], 10);
    const min = parseInt(parti[1], 10);

    // ====================================================================
    // MODIFICA SEMPLICE E DIRETTA:
    // Trova la sveglia cliccata nella lista e copia il suo testo nel pannello
    // ====================================================================
    const tutteLeSveglie = document.querySelectorAll('.alarm-item');
    let testoEtichettaFuori = "Sveglia"; // Valore di sicurezza

    tutteLeSveglie.forEach(item => {
        // Cerca la riga della lista che ha lo stesso orario di quella cliccata
        if (item.querySelector('.alarm-time').innerText === orario) {
            testoEtichettaFuori = item.querySelector('.alarm-label').innerText;
        }
    });

    // Inietta il testo trovato direttamente nell'etichetta del pannello
    const etichettaPannello = document.getElementById('panel-alarm-label');
    if (etichettaPannello) {
        etichettaPannello.innerText = testoEtichettaFuori;
    }
    // ====================================================================

    // Funzione helper matematica originale per la ruota infinita (Sempre uguale)
    const getLoopValue = (val, offset, max) => {
        let res = (val + offset) % max;
        return res < 0 ? res + max : res;
    };

    // Iniezione e formattazione Ore (0-23) - Originale
    document.getElementById('picker-h-prev3').innerText = String(getLoopValue(ore, -3, 24)).padStart(2, '0');
    document.getElementById('picker-h-prev2').innerText = String(getLoopValue(ore, -2, 24)).padStart(2, '0');
    document.getElementById('picker-h-prev1').innerText = String(getLoopValue(ore, -1, 24)).padStart(2, '0');
    document.getElementById('picker-h-curr').innerText  = String(ore).padStart(2, '0');
    document.getElementById('picker-h-next1').innerText = String(getLoopValue(ore, 1, 24)).padStart(2, '0');
    document.getElementById('picker-h-next2').innerText = String(getLoopValue(ore, 2, 24)).padStart(2, '0');
    document.getElementById('picker-h-next3').innerText = String(getLoopValue(ore, 3, 24)).padStart(2, '0');

    // Iniezione e formattazione Minuti (0-59) - Originale
    document.getElementById('picker-m-prev3').innerText = String(getLoopValue(min, -3, 60)).padStart(2, '0');
    document.getElementById('picker-m-prev2').innerText = String(getLoopValue(min, -2, 60)).padStart(2, '0');
    document.getElementById('picker-m-prev1').innerText = String(getLoopValue(min, -1, 60)).padStart(2, '0');
    document.getElementById('picker-m-curr').innerText  = String(min).padStart(2, '0');
    document.getElementById('picker-m-next1').innerText = String(getLoopValue(min, 1, 60)).padStart(2, '0');
    document.getElementById('picker-m-next2').innerText = String(getLoopValue(min, 2, 60)).padStart(2, '0');
    document.getElementById('picker-m-next3').innerText = String(getLoopValue(min, 3, 60)).padStart(2, '0');

    document.getElementById('edit-alarm-panel').classList.add('show');
}


function chiudiPannelloModifica() {
    document.getElementById('edit-alarm-panel').classList.remove('show');
}
        // MODIFICATO: Prende la foto, la applica e la salva nella memoria del telefono
function cambiaSfondo(event) {
    const file = event.target.files[0]; // Prende il file selezionato
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const immagineBase64 = e.target.result; // Trasforma la foto in dati di testo
            
            // Applica lo sfondo sul body
            document.body.style.backgroundImage = `url('${immagineBase64}')`;
            
            // NUOVO: Salva la foto nella memoria locale con la chiave 'mioSfondo'
            localStorage.setItem('mioSfondo', immagineBase64);
        };
        reader.readAsDataURL(file); // Avvia la lettura del file
    }
}

// NUOVO: Controlla se c'è uno sfondo salvato in memoria all'avvio dell'applicazione
function controllaSfondoSalvato() {
    const sfondoInMemoria = localStorage.getItem('mioSfondo');
    if (sfondoInMemoria) {
        // Se trova una foto salvata, la applica al posto di sfondo.PNG
        document.body.style.backgroundImage = `url('${sfondoInMemoria}')`;
    }
}

// NUOVO: Esegue il controllo in automatico non appena l'app viene aperta
controllaSfondoSalvato();
