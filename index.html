<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Home</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
        }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        #home-screen {
            background-image: url('sfondo.PNG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        
        #home-screen::-webkit-scrollbar {
            display: none;
        }

        #icons-slider {
            display: flex;
            width: 300%; 
            height: calc(100% - 150px); 
            margin-top: 50px; 
        }

        .grid-page {
            width: 33.333%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            box-sizing: border-box;
            padding: 10px 20px;
            gap: 15px;
            scroll-snap-align: start;
        }

        .icon-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .icon-img {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background-color: rgba(255,255,255,0.15);
        }

        #status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            pointer-events: none; 
        }

        #clock-screen { background-color: #000; box-sizing: border-box; z-index: 20; }
        .clock-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 40px 20px 10px 20px; border-bottom: 0.5px solid #1c1c1e; 
        }
        .clock-header h2 { margin: 0; color: #ff9f0a; font-size: 26px; font-weight: bold; }
        .back-btn, .add-btn { color: #ff9f0a; font-size: 24px; cursor: pointer; }
        
        #alarms-list { overflow-y: auto; flex-grow: 1; padding: 0 20px; }
        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid #1c1c1e;
        }
        .alarm-time { font-size: 48px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 13px; color: #8e8e93; margin-top: 4px; display: block; }
        .active-alarm .alarm-time, .active-alarm .alarm-label { color: #fff; }

        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="status-bar">
        <span id="live-time">09:41</span>
        <div>📶 🔋</div>
    </div>

    <div id="home-screen" class="screen">
        <div id="icons-slider">
            <div class="grid-page" id="p1"></div>
            <div class="grid-page" id="p2"></div>
            <div class="grid-page" id="p3"></div>
        </div>
    </div>

    <div id="clock-screen" class="screen hidden">
        <div class="clock-header">
            <span class="back-btn" onclick="resetApp()">✕</span>
            <h2>Sveglia</h2>
            <span class="add-btn">+</span>
        </div>
        <div id="alarms-list"></div>
    </div>

    <script>
        let inputDigits = [];
        let temporaryDigit = 0; 
        let lastPage = 0; 
        const homeScreen = document.getElementById('home-screen');

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function createGridCells(pageId) {
            const page = document.getElementById(pageId);
            for (let r = 1; r <= 6; r++) {
                for (let c = 1; c <= 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'icon-cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    const img = document.createElement('div');
                    img.className = 'icon-img';
                    cell.appendChild(img);
                    
                    page.appendChild(cell);
                }
            }
        }
        createGridCells('p1');
        createGridCells('p2');
        createGridCells('p3');

        homeScreen.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches.length > 0) {
                const touch = e.touches[0];
                if (homeScreen.scrollLeft % window.innerWidth !== 0) return;

                const element = document.elementFromPoint(touch.clientX, touch.clientY);
                const cell = element ? element.closest('.icon-cell') : null;

                if (cell && inputDigits.length < 4) {

                    const row = parseInt(cell.dataset.row);
                    const col = parseInt(cell.dataset.col);
                    
                    if (row === 4 && col === 2) temporaryDigit = 1;
                    else if (row === 4 && col === 3) temporaryDigit = 2;
                    else if (row === 4 && col === 4) temporaryDigit = 3;
                    else if (row === 5 && col === 2) temporaryDigit = 4;
                    else if (row === 5 && col === 3) temporaryDigit = 5;
                    else if (row === 5 && col === 4) temporaryDigit = 6;
                    else if (row === 6 && col === 2) temporaryDigit = 7;
                    else if (row === 6 && col === 3) temporaryDigit = 8;
                    else if (row === 6 && col === 4) temporaryDigit = 9;
                    else temporaryDigit = 0;
                } else {
                    temporaryDigit = 0;
                }
            }
        }, { passive: true });

              homeScreen.addEventListener('scroll', () => {
            const currentPage = Math.round(homeScreen.scrollLeft / window.innerWidth);
            
            if (currentPage !== lastPage) {
                if (inputDigits.length < 4) {
                    inputDigits.push(temporaryDigit);
                    temporaryDigit = 0;
                }
                lastPage = currentPage; 
            }

            if (currentPage === 0 && inputDigits.length >= 4) {
                apriSveglia();
            }
        });


        function apriSveglia() {
            homeScreen.classList.add('hidden');
            document.getElementById('clock-screen').classList.remove('hidden');

            const d1 = inputDigits[0] !== undefined ? inputDigits[0] : 0;
            const d2 = inputDigits[1] !== undefined ? inputDigits[1] : 0;
            const d3 = inputDigits[2] !== undefined ? inputDigits[2] : 0;
            const d4 = inputDigits[3] !== undefined ? inputDigits[3] : 0;

            const oraForzata = `${d1}${d2}:${d3}${d4}`;
            
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort(); 
            }

            const container = document.getElementById('alarms-list');
            container.innerHTML = "";

            sveglieStandard.forEach(orario => {
                const isActive = (orario === oraForzata);
                const alarmRow = document.createElement('div');
                alarmRow.className = `alarm-item ${isActive ? 'active-alarm' : ''}`;
                alarmRow.innerHTML = `
                    <div class="alarm-time-info">
                        <span class="alarm-time">${orario}</span>
                        <span class="alarm-label">Sveglia</span>
                    </div>
                    <div class="ios-switch ${isActive ? 'on' : ''}">
                        <div class="ios-switch-handle"></div>
                    </div>
                `;
                container.appendChild(alarmRow);
            });
        }

        function resetApp() {
            inputDigits = [];
            temporaryDigit = 0;
            lastPage = 0;
            homeScreen.scrollLeft = 0; 
            document.getElementById('clock-screen').classList.add('hidden');
            homeScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
