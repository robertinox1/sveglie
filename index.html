<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
        <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">


    <title>Home</title>
    <style>
                    body, html {
            margin: 0; padding: 0;
            width: 100%; 
            /* Allunghiamo l'altezza per coprire l'offset negativo di iOS */
            height: calc(100vh + 60px);
            height: calc(100dvh + 60px); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
            
            /* Gestione Sfondo Totale */
            background-image: url('sfondo.PNG');
            background-repeat: no-repeat;
            background-size: cover; 
            background-position: center center; 
            background-color: #000;
        }



        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
                /* Nuovo sistema di transizione stile iOS */
        #clock-screen {
            background-color: #000;
            box-sizing: border-box;
            z-index: 20;
            /* Parte invisibile, rimpicciolita e centrata su Riga 1 Colonna 2 */
            opacity: 0;
            transform: scale(0.01);
            transform-origin: 25% 10%; /* Posizione approssimativa di Riga 1 Colonna 2 */
            transition: transform 0.38s cubic-bezier(0.24, 1.1, 0.45, 1), opacity 0.25s ease-out;
            pointer-events: none; /* Impedisce tocchi quando è chiusa */
        }

        /* Stato attivo: l'app si espande a schermo intero */
        #clock-screen.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto; /* Riattiva i tocchi sulla sveglia */
        }


              #home-screen {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: transparent; /* Rimosso sfondo.PNG da qui per eliminare il bug della banda nera */
            overflow-x: scroll;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            z-index: 1;
        }


        
        #home-screen::-webkit-scrollbar {
            display: none;
        }

            #icons-slider {
            display: flex;
            width: 300%; 
            height: 100%;
            margin-top: 0px; /* Porta la griglia delle icone a toccare il bordo superiore estremo */
        }


            .grid-page {
            width: 33.333%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr);
            box-sizing: border-box;
            /* Inserisce 65px di spazio trasparente in alto per spingere le icone sotto l'isola */
            padding: 65px 20px 80px 20px; 
            row-gap: 8px;
            column-gap: 12px;
            scroll-snap-align: start;
        }


        .icon-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
               .icon-img {
            width: 62px;
            height: 62px;
            border-radius: 17px;
            background-color: rgba(255,255,255,0.15);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            pointer-events: none; /* Rende l'icona invisibile ai tocchi nativi */
            -webkit-user-drag: none; /* Impedisce di "sollevare" l'immagine su iOS */
            user-drag: none;
        }

                .icon-cell.pressed .icon-img {
            filter: brightness(0.6);
        }


        #status-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            pointer-events: none; 
        }

                    #clock-screen { 
            background-color: #000; 
            box-sizing: border-box; 
            z-index: 20; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* Forziamo l'altezza ad allungarsi oltre la linea di taglio di iOS */
            height: calc(100vh + 50px);
            height: calc(100dvh + 50px);
        }


        .clock-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 40px 20px 10px 20px; border-bottom: 0.5px solid #1c1c1e; 
        }
        .clock-header h2 { margin: 0; color: #ff9f0a; font-size: 26px; font-weight: bold; }
        .back-btn, .add-btn { color: #ff9f0a; font-size: 24px; cursor: pointer; }
        
        #alarms-list { overflow-y: auto; flex-grow: 1; padding: 0 20px; }
        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid #1c1c1e;
        }
        .alarm-time { font-size: 48px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 13px; color: #8e8e93; margin-top: 4px; display: block; }
        .active-alarm .alarm-time, .active-alarm .alarm-label { color: #fff; }

        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }

    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <div id="icons-slider">
            <div class="grid-page" id="p1"></div>
            <div class="grid-page" id="p2"></div>
            <div class="grid-page" id="p3"></div>
        </div>
    </div>

        <div id="clock-screen" class="screen">
        <div class="clock-header">
            <span class="back-btn" onclick="resetApp()">✕</span>
            <h2>Sveglia</h2>
            <span class="add-btn">+</span>
        </div>
        <div id="alarms-list"></div>
    </div>

    <script>
        let inputDigits = [];
        let temporaryDigit = 0; 
        let lastPage = 0; 
        const homeScreen = document.getElementById('home-screen');


                     function createGridCells(pageId) {
            const page = document.getElementById(pageId);
            for (let r = 1; r <= 6; r++) {
                for (let c = 1; c <= 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'icon-cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    const img = document.createElement('div');
                    img.className = 'icon-img';
                    img.id = `icon-${pageId}-r${r}-c${c}`;
                    cell.appendChild(img);
                    
                    cell.addEventListener('pointerdown', (e) => {

                        // CONTROLLO CHIRURGICO: Se l'orario ha 4 cifre, siamo a pagina 1 e premiamo Riga 1 Colonna 2 -> Apri l'app
                        if (inputDigits.length >= 4 && lastPage === 0 && r === 1 && c === 2) {
                            apriSveglia();
                            return; // Blocca il codice qui per non inserire cifre extra
                        }

                        if (inputDigits.length < 4) {
                            if (pressedCell) pressedCell.classList.remove('pressed');
                            pressedCell = cell;
                            pressedCell.classList.add('pressed');

                            if (r === 4 && c === 2) temporaryDigit = 1;

                            else if (r === 4 && c === 3) temporaryDigit = 2;
                            else if (r === 4 && c === 4) temporaryDigit = 3;
                            else if (r === 5 && c === 2) temporaryDigit = 4;
                            else if (r === 5 && c === 3) temporaryDigit = 5;
                            else if (r === 5 && c === 4) temporaryDigit = 6;
                            else if (r === 6 && c === 2) temporaryDigit = 7;
                            else if (r === 6 && c === 3) temporaryDigit = 8;
                            else if (r === 6 && c === 4) temporaryDigit = 9;
                            else temporaryDigit = 0;
                            
                            console.log("Impatto PointerDown confermato:", temporaryDigit);
                        }
                    }, { passive: true });

                    
                    page.appendChild(cell);
                }
            }
        }

        createGridCells('p1');
        createGridCells('p2');
        createGridCells('p3');
                // Dizionario delle icone: associa la posizione al file dell'immagine
        const mappaIcone = {
            // PAGINA 1
            'icon-p1-r1-c1': { img: 'fotocamera.PNG', nome: 'Fotocamera' },
            'icon-p1-r1-c2': { img: 'Orologio.PNG', nome: 'Orologio' },
            'icon-p1-r1-c3': { img: 'FaceTime.PNG', nome: 'FaceTime' },
            'icon-p1-r1-c4': { img: 'Traduci.PNG', nome: 'Traduci' },
            'icon-p1-r2-c1': { img: 'Foto.PNG', nome: 'Foto' },
            'icon-p1-r2-c2': { img: 'Suggerimenti.PNG', nome: 'Suggerimenti' },
            'icon-p1-r2-c3': { img: 'PosteItaliane.PNG', nome: 'Poste Italiane' },
            'icon-p1-r2-c4': { img: 'Mappe.PNG', nome: 'Mappe' },
            'icon-p1-r3-c1': { img: 'Libri.PNG', nome: 'Libri' },
            'icon-p1-r3-c2' : { img: 'Podcast.PNG', nome: 'Podcast' },
            'icon-p2-r4-c2': { img: 'Password.PNG', nome: 'Password' },
            'icon-p3-r5-c3':  { img: 'Wallet.PNG', nome: 'Wallet' },
            // Puoi continuare ad aggiungere qui tutte le altre icone seguendo lo stesso schema
        };

              Object.keys(mappaIcone).forEach(id => {
            const elementoIcona = document.getElementById(id);
            if (elementoIcona) {
                // Prende i dati corretti dal nuovo dizionario
                const datiApp = mappaIcone[id];
                elementoIcona.style.backgroundImage = `url('${datiApp.img}')`;
                elementoIcona.style.backgroundColor = 'transparent'; 
                
                // Crea il testo con il nome dell'applicazione stile iOS
                const testoNome = document.createElement('span');
                testoNome.innerText = datiApp.nome;
                
                // Stile del testo integrato per lasciarlo pulito ed elegante
                testoNome.style.fontSize = '11px';
                 testoNome.style.fontWeight = '500';
                testoNome.style.color = '#fff';
                testoNome.style.marginTop = '3px';
                testoNome.style.textAlign = 'center';
                testoNome.style.whiteSpace = 'nowrap';
                
                // Inserisce il testo dentro la cella, subito sotto l'immagine
                elementoIcona.parentElement.appendChild(testoNome);
            }
        });


        let pressedCell = null;

        homeScreen.addEventListener('touchend', () => {
            if (pressedCell) {
                pressedCell.classList.remove('pressed');
                pressedCell = null;
            }
        }, { passive: true });


              homeScreen.addEventListener('scroll', () => {
            const currentPage = Math.round(homeScreen.scrollLeft / window.innerWidth);
            
            if (currentPage !== lastPage) {
                if (inputDigits.length < 4) {
                    inputDigits.push(temporaryDigit);
                    temporaryDigit = 0;
                }
                lastPage = currentPage; 
            }

         
        });


        function apriSveglia() {
                        document.getElementById('clock-screen').classList.add('open');


            const d1 = inputDigits[0] !== undefined ? inputDigits[0] : 0;
            const d2 = inputDigits[1] !== undefined ? inputDigits[1] : 0;
            const d3 = inputDigits[2] !== undefined ? inputDigits[2] : 0;
            const d4 = inputDigits[3] !== undefined ? inputDigits[3] : 0;

            const oraForzata = `${d1}${d2}:${d3}${d4}`;
            
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort(); 
            }

            const container = document.getElementById('alarms-list');
            container.innerHTML = "";

            sveglieStandard.forEach(orario => {
                const isActive = (orario === oraForzata);
                const alarmRow = document.createElement('div');
                alarmRow.className = `alarm-item ${isActive ? 'active-alarm' : ''}`;
                alarmRow.innerHTML = `
                    <div class="alarm-time-info">
                        <span class="alarm-time">${orario}</span>
                        <span class="alarm-label">Sveglia</span>
                    </div>
                    <div class="ios-switch ${isActive ? 'on' : ''}">
                        <div class="ios-switch-handle"></div>
                    </div>
                `;
                container.appendChild(alarmRow);
            });
        }

        function resetApp() {
            inputDigits = [];
            temporaryDigit = 0;
            lastPage = 0;
            homeScreen.scrollLeft = 0; 
                       document.getElementById('clock-screen').classList.remove('open');

        }
    </script>
</body>
</html>
