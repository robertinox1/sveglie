<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Home</title>
    <style>
        /* STILE GENERALE */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff;
            overflow: hidden; 
            select: none;
            -webkit-user-select: none;
        }
        .screen { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* STRUTTURA A 3 PAGINE SCORREVOLI */
        #home-screen {
            background-color: #000;
        }
        #slider-container {
            display: flex;
            width: 300%; /* Spazio per 3 pagine affiancate */
            height: 100%;
            transition: transform 0.3s ease-out; /* Animazione dello swipe flessibile ed elegante */
            transform: translateX(0%);
        }
        .page {
            width: 33.333%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        /* Assegnazione dei tuoi 3 screenshot */
        #page1 { background-image: url('home1.PNG'); }
        #page2 { background-image: url('home2.PNG'); }
        #page3 { background-image: url('home3.PNG'); }

        #status-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; justify-content: space-between;
            padding: 14px 24px 0 24px; font-size: 15px; font-weight: 600;
            letter-spacing: -0.2px;
            pointer-events: none; /* Impedisce alla barra di bloccare i tocchi */
        }
        .battery-icons { font-size: 14px; letter-spacing: 2px; }

        /* INTERFACCIA SVEGLIA STYLE iOS */
        #clock-screen { background-color: #000; box-sizing: border-box; z-index: 20; }
        .clock-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 20px 10px 20px; border-bottom: 0.5px solid #1c1c1e; 
        }
        .clock-header h2 { margin: 0; color: #ff9f0a; font-size: 26px; font-weight: bold; }
        .back-btn, .add-btn { color: #ff9f0a; font-size: 24px; cursor: pointer; font-weight: 400; }
        
        #alarms-list {
            overflow-y: auto;
            flex-grow: 1;
            padding: 0 20px;
        }
        .alarm-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 0.5px solid #1c1c1e;
        }
        .alarm-time { font-size: 48px; font-weight: 200; color: #8e8e93; line-height: 1; }
        .alarm-label { font-size: 13px; color: #8e8e93; margin-top: 4px; display: block; }

        .active-alarm .alarm-time { color: #fff; font-weight: 300; }
        .active-alarm .alarm-label { color: #fff; }

        .ios-switch {
            width: 51px; height: 31px; background-color: #2c2c2e;
            border-radius: 16px; position: relative; transition: background-color 0.2s;
        }
        .ios-switch.on { background-color: #34c759; }
        .ios-switch-handle {
            width: 27px; height: 27px; background-color: #fff;
            border-radius: 50%; position: absolute; top: 2px; left: 2px;
            transition: transform 0.2s; box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        .ios-switch.on .ios-switch-handle { transform: translateX(20px); }
    </style>
</head>
<body>

    <!-- SCHERMATA HOME IPHONE -->
    <div id="home-screen" class="screen">
        <div id="status-bar">
            <span id="live-time">09:41</span>
            <div class="battery-icons">📶 🔋</div>
        </div>
        
        <!-- Contenitore delle 3 pagine della Home -->
        <div id="slider-container">
            <div class="page" id="page1"></div>
            <div class="page" id="page2"></div>
            <div class="page" id="page3"></div>
        </div>
    </div>

    <!-- SCHERMATA FALSA SVEGLIA -->
    <div id="clock-screen" class="screen hidden">
        <div class="clock-header">
            <span class="back-btn" onclick="resetApp()">✕</span>
            <h2>Sveglia</h2>
            <span class="add-btn">+</span>
        </div>
        <div id="alarms-list">
            <!-- Generato dinamicamente -->
        </div>
    </div>

    <script>
        let touchStartX = 0;
        let touchStartY = 0;
        let inputDigits = []; 
        let swipeCount = 0;
        let currentPage = 0; // Traccia la pagina visiva attuale (0, 1 o 2)

        function updateClock() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000);
        updateClock();

        const homeScreen = document.getElementById('home-screen');
        const sliderContainer = document.getElementById('slider-container');

        homeScreen.addEventListener('touchstart', (e) => {
            if (swipeCount >= 4) return; 

            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;

            // Prende l'input segreto nel punto esatto del touch
            const digit = getDigitFromCoords(touchStartX, touchStartY);
            inputDigits.push(digit);
            swipeCount++;

            // Gestione del movimento visivo delle pagine in base agli swipe richiesti:
            // Swipe 1 (ora decine): va a Pagina 2 (Index 1)
            // Swipe 2 (ora unità): va a Pagina 3 (Index 2)
            // Swipe 3 (minuti decine): torna a Pagina 2 (Index 1)
            // Swipe 4 (minuti unità): torna a Pagina 1 (Index 0)
            if (swipeCount === 1) currentPage = 1;
            else if (swipeCount === 2) currentPage = 2;
            else if (swipeCount === 3) currentPage = 1;
            else if (swipeCount === 4) currentPage = 0;

            // Applica lo spostamento visivo immediato o fluido dello schermo
            sliderContainer.style.transform = `translateX(-${currentPage * 33.333}%)`;
        }, { passive: true });

        homeScreen.addEventListener('touchend', (e) => {
            // Dopo il 4° tocco/swipe, l'orario è completo. Il prossimo tocco sblocca la sveglia.
            if (swipeCount >= 4) {
                setTimeout(apriSveglia, 400);
            }
        });

        function getDigitFromCoords(x, y) {
            const w = window.innerWidth;
            const h = window.innerHeight;

            const isRightSide = x > (w * 0.25); 
            const isBottomSide = y > (h * 0.5); 

            if (isRightSide && isBottomSide) {
                const gridX = Math.floor((x - (w * 0.25)) / ((w * 0.75) / 3));
                const gridY = Math.floor((y - (h * 0.5)) / ((h * 0.5) / 3));

                const matrix = [,
 ,
                    [7, 8, 9]
                ];

                const targetY = Math.min(Math.max(gridY, 0), 2);
                const targetX = Math.min(Math.max(gridX, 0), 2);
                
                return matrix[targetY][targetX];
            }
            return 0; 
        }

        function apriSveglia() {
            homeScreen.classList.add('hidden');
            document.getElementById('clock-screen').classList.remove('hidden');

            const oraForzata = `${inputDigits[0] || 0}${inputDigits[1] || 0}:${inputDigits[2] || 0}${inputDigits[3] || 0}`;
            let sveglieStandard = ["06:15", "07:00", "07:30", "08:45", "12:00", "14:15", "19:30", "22:00", "23:15"];
            
            if (!sveglieStandard.includes(oraForzata)) {
                sveglieStandard.push(oraForzata);
                sveglieStandard.sort(); 
            }

            const container = document.getElementById('alarms-list');
            container.innerHTML = "";

            sveglieStandard.forEach(orario => {
                const isActive = (orario === oraForzata);
                const alarmRow = document.createElement('div');
                alarmRow.className = `alarm-item ${isActive ? 'active-alarm' : ''}`;
                alarmRow.innerHTML = `
                    <div class="alarm-time-info">
                        <span class="alarm-time">${orario}</span>
                        <span class="alarm-label">Sveglia</span>
                    </div>
                    <div class="ios-switch ${isActive ? 'on' : ''}">
                        <div class="ios-switch-handle"></div>
                    </div>
                `;
                container.appendChild(alarmRow);
            });
        }

        function resetApp() {
            inputDigits = [];
            swipeCount = 0;
            currentPage = 0;
            sliderContainer.style.transform = `translateX(0%)`;
            document.getElementById('clock-screen').classList.add('hidden');
            homeScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
